{% extends "base.html" %}

{% block title %}Batch Setup — Medici Engine{% endblock %}

{% block heading %}Batch Setup{% endblock %}

{% block content %}
<form hx-post="/ui/batch" hx-target="#batch-result" hx-swap="innerHTML">
    <fieldset>
        <legend>Persona Selection</legend>

        <label for="persona_a">Persona A</label>
        <select name="persona_a" id="persona_a">
            <option value="">Random</option>
            {% for persona in personas %}
            <option value="{{ persona.name }}">{{ persona.name }} — {{ persona.title }}</option>
            {% endfor %}
        </select>

        <label for="persona_b">Persona B</label>
        <select name="persona_b" id="persona_b">
            <option value="">Random</option>
            {% for persona in personas %}
            <option value="{{ persona.name }}">{{ persona.name }} — {{ persona.title }}</option>
            {% endfor %}
        </select>
    </fieldset>

    <fieldset>
        <legend>Shared Object</legend>

        <label for="shared_object">Shared Object</label>
        <select name="shared_object" id="shared_object">
            <option value="">Random</option>
            {% for obj in shared_objects %}
            <option value="{{ loop.index0 }}">[{{ loop.index0 }}] ({{ obj.object_type }}) {{ obj.text[:80] }}...</option>
            {% endfor %}
        </select>
    </fieldset>

    <fieldset>
        <legend>Run Configuration</legend>

        <label for="turns_per_agent">Turns per Agent</label>
        <input type="number" name="turns_per_agent" id="turns_per_agent" value="5" min="1" max="20">

        <label for="num_conversations">Number of Conversations</label>
        <input type="number" name="num_conversations" id="num_conversations" value="1" min="1" max="50">

        <label>
            <input type="checkbox" name="use_informed_selection" id="use_informed_selection" value="1">
            Use performance-informed persona selection
        </label>
    </fieldset>

    <button type="submit">Launch Batch</button>
</form>

<div id="batch-result"></div>
{% endblock %}
